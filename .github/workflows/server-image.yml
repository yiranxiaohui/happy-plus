name: Build & push server image (ghcr.io)

# Builds packages/happy-server via Dockerfile.server using workspace
# context (repo root), then pushes to GitHub Container Registry as
# ghcr.io/<owner>/happy-plus-server. The repo owner is lowercased to
# satisfy GHCR's naming rules.
#
# Triggers:
#   - manual (workflow_dispatch) — pushes :latest + :sha-<short>
#   - tag server-plus-v* — pushes :latest + :sha-<short> + :<tag>
#
# Pull on a host with:
#   docker pull ghcr.io/<owner>/happy-plus-server:latest

on:
  workflow_dispatch:
  push:
    tags:
      - 'server-plus-v*'   # server-only release
      - 'v*'               # Unified release: triggers CLI + APK + server + web simultaneously

permissions:
  contents: write   # for softprops/action-gh-release
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Bumped from 30 -> 60: the server image now also runs the webapp's
    # `expo export` (web client bundled for same-origin serving), which is
    # significantly heavier than the API-only build on a cold cache.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The merged build (full workspace install + expo web export + server)
      # can exceed the ~14GB free disk on ubuntu-latest. Reclaim ~25GB of
      # preinstalled toolchains we don't use before building.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force || true
          df -h

      - name: Set lowercase image name
        id: image
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${OWNER}/happy-plus-server" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      - name: Build & push
        id: buildpush
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attach image reference to GitHub Release (any v* / server-plus-v* tag)
        if: startsWith(github.ref, 'refs/tags/server-plus-v') || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # release-init.yml handles notes for unified v* tags; only generate
          # locally for server-plus-v* single-component releases.
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/server-plus-v') }}
          append_body: true
          body: |

            ### 🖥️ Server image (`Dockerfile.server` → GHCR)

            ```
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:latest
            ```

            Digest: `${{ steps.buildpush.outputs.digest }}`

            Pull:
            ```bash
            docker pull ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ```
