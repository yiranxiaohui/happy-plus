name: Build & push server image (ghcr.io)

# Builds packages/happy-server via Dockerfile.server using workspace
# context (repo root), then pushes to GitHub Container Registry as
# ghcr.io/<owner>/happy-plus-server. The repo owner is lowercased to
# satisfy GHCR's naming rules.
#
# Triggers:
#   - manual (workflow_dispatch) — pushes :latest + :sha-<short>
#   - tag server-plus-v* — pushes :latest + :sha-<short> + :<tag>
#
# Pull on a host with:
#   docker pull ghcr.io/<owner>/happy-plus-server:latest

on:
  workflow_dispatch:
  push:
    tags:
      - 'server-plus-v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${OWNER}/happy-plus-server" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
