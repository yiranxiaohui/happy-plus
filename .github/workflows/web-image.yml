name: Build & push web image (ghcr.io)

# Builds packages/happy-app web export via Dockerfile.webapp using
# workspace context (repo root), then pushes to GitHub Container
# Registry as ghcr.io/<owner>/happy-plus-web. The repo owner is
# lowercased to satisfy GHCR's naming rules.
#
# HAPPY_SERVER_URL is baked into the JS bundle at build time. The
# workflow defaults to https://happy.yunnet.top (the maintainer's
# self-hosted endpoint); override via workflow_dispatch input or
# repo variable HAPPY_SERVER_URL when running on another host.
#
# Triggers:
#   - manual (workflow_dispatch) — pushes :latest + :sha-<short>
#   - tag web-plus-v* — pushes :latest + :sha-<short> + :<tag>
#   - tag v* (unified release) — same
#
# Pull on a host with:
#   docker pull ghcr.io/<owner>/happy-plus-web:latest

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: 'HAPPY_SERVER_URL baked into the JS bundle'
        required: false
        default: 'https://happy.yunnet.top'
        type: string
  push:
    tags:
      - 'web-plus-v*'
      - 'v*'

permissions:
  contents: write   # for softprops/action-gh-release
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${OWNER}/happy-plus-web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=ref,event=tag

      - name: Build & push
        id: buildpush
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.webapp
          push: true
          build-args: |
            HAPPY_SERVER_URL=${{ github.event.inputs.server_url || vars.HAPPY_SERVER_URL || 'https://happy.yunnet.top' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attach image reference to GitHub Release (any v* / web-plus-v* tag)
        if: startsWith(github.ref, 'refs/tags/web-plus-v') || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |

            ### 🌐 Web image (`Dockerfile.webapp` → GHCR)

            ```
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:latest
            ```

            Digest: `${{ steps.buildpush.outputs.digest }}`
            Built with `HAPPY_SERVER_URL=${{ github.event.inputs.server_url || vars.HAPPY_SERVER_URL || 'https://happy.yunnet.top' }}`

            Pull:
            ```bash
            docker pull ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ```
