name: Build CLI tarball (happy-plus)

# Rewrites packages/happy-cli/package.json in-flight to rename the npm
# package + binary to happy-plus, then pnpm builds and npm packs into a
# tarball. Uploaded as a workflow artifact, attached to a GitHub Release
# AND published to npmjs.org when triggered by a cli-plus-v* tag.
#
# Install after a tag-triggered publish:
#   npm i -g happy-plus            # always the latest published version
# Binary command: happy-plus (does not collide with upstream `happy`).
#
# Manual dispatch only produces a workflow artifact (no publish), suited
# for local testing before tagging.

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Suffix appended to upstream version, e.g. -plus.0'
        required: true
        default: '-plus.0'
        type: string
  push:
    tags:
      - 'cli-plus-v*'   # CLI-only release
      - 'v*'            # Unified release: triggers CLI + APK + server + web simultaneously

permissions:
  contents: write
  id-token: write   # for npm publish --provenance

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERSION_SUFFIX: ${{ github.event.inputs.version_suffix || '-plus.0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Rename happy-cli package to happy-plus
        run: |
          set -e
          cd packages/happy-cli
          ORIG_VER=$(jq -r '.version' package.json)
          # Tag push: cli-plus-vX.Y.Z drives the published version verbatim.
          # Manual dispatch: upstream-version + VERSION_SUFFIX.
          if [[ "$GITHUB_REF" == refs/tags/cli-plus-v* ]]; then
            NEW_VER="${GITHUB_REF_NAME#cli-plus-v}"
            echo "Tag-driven (cli-plus-v*): ${GITHUB_REF_NAME} -> happy-plus@${NEW_VER}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            NEW_VER="${GITHUB_REF_NAME#v}"
            echo "Tag-driven (unified v*): ${GITHUB_REF_NAME} -> happy-plus@${NEW_VER}"
          else
            NEW_VER="${ORIG_VER}${VERSION_SUFFIX}"
            echo "Dispatch-driven: happy@${ORIG_VER} + ${VERSION_SUFFIX} -> happy-plus@${NEW_VER}"
          fi
          REPO_URL="git+https://github.com/${GITHUB_REPOSITORY}.git"
          jq --arg v "$NEW_VER" --arg repo "$REPO_URL" '
              .name = "happy-plus"
            | .version = $v
            | .bin = { "happy-plus": "./bin/happy.mjs", "happy-plus-mcp": "./bin/happy-mcp.mjs" }
            | .repository = { type: "git", url: $repo }
            | del(.scripts.prepublishOnly)
          ' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq '{name, version, bin, repository, scripts}' package.json

      - name: Install workspace dependencies
        run: pnpm install --filter "happy-plus..." --no-frozen-lockfile

      - name: Build CLI
        working-directory: packages/happy-cli
        run: pnpm build

      - name: Pack tarball
        id: pack
        working-directory: packages/happy-cli
        run: |
          set -e
          # pnpm pack rewrites workspace:* deps to concrete versions; npm pack
          # does not, which makes the resulting tarball uninstallable by npm.
          pnpm pack
          TGZ=$(ls happy-plus-*.tgz | head -1)
          echo "tgz_name=$TGZ" >> "$GITHUB_OUTPUT"
          echo "tgz_path=packages/happy-cli/$TGZ" >> "$GITHUB_OUTPUT"
          ls -lh "$TGZ"
          # Sanity-check no workspace: deps leaked
          tar -xzOf "$TGZ" package/package.json | jq '.dependencies | with_entries(select(.value | test("workspace:")))'

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.tgz_name }}
          path: ${{ steps.pack.outputs.tgz_path }}
          retention-days: 30

      - name: Attach to GitHub Release (any v* / cli-plus-v* tag)
        if: startsWith(github.ref, 'refs/tags/cli-plus-v') || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.tgz_path }}
          # release-init.yml is the leader for unified v* tags and creates the
          # release with auto-generated notes. For cli-plus-v* single-component
          # releases, generate notes here.
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/cli-plus-v') }}

      - name: Publish to npm (any v* / cli-plus-v* tag)
        if: startsWith(github.ref, 'refs/tags/cli-plus-v') || startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/happy-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # pnpm publish reuses the tarball produced by pnpm pack above (matching
        # the workspace:* rewrites). --no-git-checks skips the clean-tree check
        # since we're publishing from a tag detached commit.
        run: pnpm publish --access public --provenance --no-git-checks
